template: writ_or_statement_explanation_template
subject: |
  How do I know?
content: |
  A **writ of garnishment** is a court order telling a garnishee (like your bank or your employer) to give your money to a creditor to pay for a judgment.

  A **written statement** is something you get from your creditor if you wages are being garnished that tells you how much you still owe. You can object if you believe the amount on the statement is wrong.
---
