id: writ_is_invalid
question: |
  The Writ of Garnishment is not properly issued if there's an error or mistake in the writ or the way it was issued.
subquestion: |
  For example, a writ was not properly issued if it was issued based on false information. 

  A garnishment could be invalid if, for example, the interest, costs, or judgment amount are inaccurate. The garnishment is also invalid if it is expired. A writ for periodic garnishment does  not expire. It is effective until the balance of the judgement, interest, and costs are paid. But, a nonperiodic garnishment expires 18 days after it was issued.

fields:
  - Was the writ **not properly issued** or **invalid**?: writ_is_invalid
    datatype: yesnoradio
  - note: |
      ${ collapse_template(invalid_writ_explanation_template) }
---
template: invalid_writ_explanation_template
subject: |
  How do I know?
content: |
  This means there's an error or mistake in the writ or the way it was issued. For example, a writ was not properly issued if it was issued based on false information.
